<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM Services Dashboard - Live AI Services</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(to bottom right, #0a0e27, #1a1f3a, #0f1425);
            color: #fff;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .bg-blob-1, .bg-blob-2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: float 25s ease-in-out infinite;
        }

        .bg-blob-1 {
            top: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, transparent 70%);
        }

        .bg-blob-2 {
            bottom: -10%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
            animation-delay: 1s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(40px, -40px); }
        }

        header {
            position: relative;
            z-index: 10;
            border-bottom: 1px solid rgba(71, 85, 105, 0.5);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .tier-badge {
            background: linear-gradient(135deg, #fbbf24, #f97316);
            color: #000;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .logout-btn {
            padding: 0.5rem 1rem;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.6);
            color: #c4b5fd;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: rgba(139, 92, 246, 0.3);
        }

        .container {
            position: relative;
            z-index: 5;
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .dashboard-header {
            margin-bottom: 2rem;
        }

        .dashboard-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tier-info {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .tier-stat {
            display: flex;
            flex-direction: column;
        }

        .tier-stat-label {
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .tier-stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .service-card {
            background: rgba(30, 41, 59, 0.5);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 1.5rem;
            padding: 2rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .service-card:hover {
            border-color: rgba(139, 92, 246, 0.6);
            transform: translateY(-8px);
        }

        .service-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .service-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .service-description {
            color: #cbd5e1;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .service-badge {
            display: inline-block;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.4);
            padding: 0.3rem 0.6rem;
            border-radius: 0.3rem;
            font-size: 0.7rem;
            color: #c4b5fd;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .service-button {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            border: none;
            border-radius: 0.6rem;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .service-button:hover {
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.6);
            transform: translateY(-2px);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid rgba(139, 92, 246, 0.6);
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: #cbd5e1;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-right: 2rem;
        }

        .modal-icon {
            font-size: 2.5rem;
        }

        .modal h2 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .service-interface {
            background: rgba(88, 28, 135, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 1rem;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .success-msg {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #86efac;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }

        .textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 0.5rem;
            color: #06b6d4;
            font-family: monospace;
            resize: vertical;
            margin-bottom: 1rem;
        }

        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            border: none;
            border-radius: 0.6rem;
            font-weight: 700;
            cursor: pointer;
        }

        .btn:hover {
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.6);
        }

        .btn-secondary {
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.6);
            color: #c4b5fd;
        }

        footer {
            border-top: 1px solid rgba(139, 92, 246, 0.3);
            padding: 2rem;
            text-align: center;
            color: #64748b;
            font-size: 0.875rem;
            position: relative;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="bg-blob-1"></div>
        <div class="bg-blob-2"></div>
    </div>

    <header>
        <div class="header-content">
            <div class="logo">
                <span style="font-size: 1.8rem;">⚙️</span>
                AXIOM Dashboard
            </div>
            <div class="user-section">
                <div class="tier-badge" id="tierBadge">Enterprise</div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </header>

    <div class="container">
        <section class="dashboard-header">
            <h1>🚀 Your AXIOM AI Services</h1>
            <p>Live AI tools ready to use - powered by industry-leading models</p>
        </section>

        <div class="tier-info">
            <div class="tier-stat">
                <div class="tier-stat-label">Your Plan</div>
                <div class="tier-stat-value" id="planName">Enterprise</div>
            </div>
            <div class="tier-stat">
                <div class="tier-stat-label">Services Unlocked</div>
                <div class="tier-stat-value" id="servicesCount">10/10</div>
            </div>
            <div class="tier-stat">
                <div class="tier-stat-label">Monthly API Limit</div>
                <div class="tier-stat-value" id="apiLimit">∞</div>
            </div>
            <div class="tier-stat">
                <div class="tier-stat-label">Status</div>
                <div class="tier-stat-value">✅ Active</div>
            </div>
        </div>

        <h2 style="font-size: 1.5rem; margin-bottom: 2rem; background: linear-gradient(135deg, #8b5cf6, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">🎯 AI Services</h2>

        <div class="services-grid" id="servicesGrid">
            <!-- Services populated here -->
        </div>
    </div>

    <!-- Service Modal -->
    <div class="modal" id="serviceModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-header">
                <div class="modal-icon" id="modalIcon"></div>
                <div>
                    <h2 id="modalTitle"></h2>
                </div>
            </div>

            <div class="service-interface">
                <div class="success-msg" id="successMsg"></div>
                <div id="service-content"></div>
            </div>

            <div class="button-row">
                <button class="btn btn-secondary" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 AXIOM - The Operating System for AI | All Rights Reserved</p>
    </footer>

    <script>
        const SERVICES = [
            { id: 'freelancing', name: 'AI Freelancing', icon: '💼', description: 'Create & monetize AI services', features: ['Auto-pricing', 'Payment processing', 'Client management'] },
            { id: 'voice-agents', name: 'Voice Agents', icon: '🎤', description: 'Deploy voice AI instantly', features: ['50+ languages', 'Real-time transcription', 'Auto-responses'] },
            { id: 'virtual-assistants', name: 'Virtual Assistants', icon: '🤖', description: 'White-label AI assistants', features: ['Custom training', 'Multi-channel', 'Analytics'] },
            { id: 'chatbots', name: 'Chatbot Agents', icon: '💬', description: 'Intelligent chatbots', features: ['No-code builder', 'Sentiment analysis', 'Multi-platform'] },
            { id: 'lead-generation', name: 'Lead Generation', icon: '📧', description: 'AI-powered prospecting', features: ['Auto-qualification', 'CRM sync', 'Real-time leads'] },
            { id: 'content-ai', name: 'Content AI', icon: '✍️', description: 'Repurpose content instantly', features: ['10+ formats', 'SEO optimized', 'Batch processing'] },
            { id: 'copywriting', name: 'Copywriting AI', icon: '📝', description: 'Generate high-converting copy', features: ['Brand voice', 'A/B testing', 'Performance analytics'] },
            { id: 'cybersecurity', name: 'Cybersecurity AI', icon: '🔒', description: 'Threat detection & prevention', features: ['Real-time monitoring', 'Auto-response', 'Compliance ready'] },
            { id: 'agent-development', name: 'Agent Development', icon: '🔧', description: 'Build custom AI agents', features: ['Visual builder', 'Memory management', 'Tool integration'] },
            { id: 'venture-studio', name: 'AI Venture Studio', icon: '🚀', description: 'Launch AI startups', features: ['Startup templates', 'Funding guidance', 'Growth tools'] }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            renderServices();
        });

        function renderServices() {
            const grid = document.getElementById('servicesGrid');
            grid.innerHTML = '';

            SERVICES.forEach(service => {
                const card = document.createElement('div');
                card.className = 'service-card';
                card.innerHTML = `
                    <div class="service-icon">${service.icon}</div>
                    <h3 class="service-title">${service.name}</h3>
                    <p class="service-description">${service.description}</p>
                    <div class="service-badge">✅ Ready to Use</div>
                    ${service.features.map(f => `<div style="color: #cbd5e1; font-size: 0.8rem;">• ${f}</div>`).join('')}
                    <button class="service-button" style="margin-top: 1rem;" onclick="openService('${service.id}')">
                        ▶️ Launch
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        function openService(serviceId) {
            const service = SERVICES.find(s => s.id === serviceId);
            document.getElementById('modalIcon').textContent = service.icon;
            document.getElementById('modalTitle').textContent = service.name;
            
            let content = `<h3 style="color: #c4b5fd; margin-bottom: 1rem;">${service.name} Tool</h3>`;
            
            switch(serviceId) {
                case 'freelancing':
                    content += `<input type="text" placeholder="Service Name" class="textarea" style="height: auto;">
                              <input type="number" placeholder="Price ($)" class="textarea" style="height: auto;">
                              <button class="btn" onclick="executeService('${serviceId}')">📋 Create Service</button>`;
                    break;
                case 'voice-agents':
                    content += `<select class="textarea" style="height: auto;">
                              <option>English (US)</option><option>Spanish</option><option>French</option>
                            </select>
                            <textarea placeholder="Instructions" class="textarea" rows="3"></textarea>
                            <button class="btn" onclick="executeService('${serviceId}')">🎙️ Deploy</button>`;
                    break;
                case 'chatbots':
                    content += `<input type="text" placeholder="Chatbot Name" class="textarea" style="height: auto;">
                              <textarea placeholder="Personality" class="textarea" rows="3"></textarea>
                              <button class="btn" onclick="executeService('${serviceId}')">🤖 Deploy</button>`;
                    break;
                case 'content-ai':
                    content += `<textarea placeholder="Paste content" class="textarea" rows="4"></textarea>
                              <button class="btn" onclick="executeService('${serviceId}')">🚀 Transform</button>`;
                    break;
                case 'copywriting':
                    content += `<input type="text" placeholder="Product Name" class="textarea" style="height: auto;">
                              <select class="textarea" style="height: auto;">
                              <option>Landing Page</option><option>Email</option><option>Social Ads</option>
                            </select>
                            <button class="btn" onclick="executeService('${serviceId}')">✨ Generate</button>`;
                    break;
                default:
                    content += `<button class="btn" onclick="executeService('${serviceId}')">🚀 Launch ${service.name}</button>`;
            }
            
            document.getElementById('service-content').innerHTML = content;
            document.getElementById('serviceModal').classList.add('active');
        }

        function executeService(serviceId) {
            const service = SERVICES.find(s => s.id === serviceId);
            const successMsg = document.getElementById('successMsg');
            successMsg.textContent = `✅ ${service.name} Activated!\nStatus: Live & Ready\nService ID: ${generateId()}`;
            successMsg.style.display = 'block';
        }

        function generateId() {
            return Math.random().toString(36).substr(2, 9).toUpperCase();
        }

        function closeModal() {
            document.getElementById('serviceModal').classList.remove('active');
        }

        function logout() {
            if (confirm('Logout from AXIOM?')) {
                sessionStorage.clear();
                window.location.href = 'index.html';
            }
        }

        document.getElementById('serviceModal').addEventListener('click', (e) => {
            if (e.target.id === 'serviceModal') closeModal();
        });
    </script>
</body>
</html>
