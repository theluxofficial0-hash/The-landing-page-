<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM - Verifying Payment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(to bottom right, #0a0e27, #1a1f3a, #0f1425);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .bg-blob-1 {
            position: absolute;
            top: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(100px);
            animation: float 25s ease-in-out infinite;
        }

        .bg-blob-2 {
            position: absolute;
            bottom: -10%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(100px);
            animation: float 30s ease-in-out infinite 1s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(40px, -40px); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container {
            position: relative;
            z-index: 5;
            max-width: 600px;
            margin: 0 2rem;
        }

        .verification-box {
            background: rgba(88, 28, 135, 0.2);
            border: 2px solid rgba(139, 92, 246, 0.6);
            border-radius: 2rem;
            padding: 3rem;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .status-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-icon.checking {
            animation: spin 2s linear infinite;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-text {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin: 2rem 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            animation: progress 3s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 100%; }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid rgba(239, 68, 68, 0.5);
            border-radius: 1rem;
            padding: 1.5rem;
            margin: 2rem 0;
            color: #fca5a5;
            display: none;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 2px solid rgba(34, 197, 94, 0.5);
            border-radius: 1rem;
            padding: 1.5rem;
            margin: 2rem 0;
            color: #86efac;
            display: none;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .button {
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-block;
        }

        .button-primary {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
        }

        .button-primary:hover {
            box-shadow: 0 0 60px rgba(139, 92, 246, 0.8);
            transform: translateY(-3px);
        }

        .button-secondary {
            background: rgba(139, 92, 246, 0.2);
            color: #c4b5fd;
            border: 1px solid rgba(139, 92, 246, 0.6);
        }

        .button-secondary:hover {
            background: rgba(139, 92, 246, 0.3);
            border-color: rgba(139, 92, 246, 0.8);
        }

        .verification-code {
            background: rgba(15, 23, 42, 0.8);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(139, 92, 246, 0.3);
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #06b6d4;
            margin: 1rem 0;
            word-break: break-all;
        }

        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid rgba(59, 130, 246, 0.6);
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin: 2rem 0;
            font-size: 0.9rem;
            color: #bfdbfe;
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="bg-blob-1"></div>
        <div class="bg-blob-2"></div>
    </div>

    <div class="container">
        <div class="verification-box">
            <div class="status-icon checking" id="statusIcon">🔍</div>
            <h1 id="statusTitle">Verifying Your Payment</h1>
            <p class="status-text" id="statusText">
                Please wait while we confirm your Gumroad purchase. This usually takes 10-15 seconds.
            </p>
            
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <div class="info-box" id="infoBox" style="display: none;">
                <strong>Payment Verified!</strong> Your AXIOM license has been confirmed. You'll be redirected to your dashboard in a moment.
            </div>

            <div class="button-group" id="buttonGroup" style="display: none;">
                <a href="services-dashboard.html" class="button button-primary">🚀 Access AXIOM Services</a>
                <a href="index.html" class="button button-secondary">← Back to Home</a>
            </div>

            <div class="verification-code" id="verificationCode" style="display: none;"></div>
        </div>
    </div>

    <script>
        // Payment Verification System
        const GUMROAD_API_KEY = 'YOUR_GUMROAD_API_KEY'; // Replace with actual key
        const PURCHASE_PRODUCT_ID = 'mlwtw'; // Your Gumroad product ID
        
        // Simulate verification (in production, verify with Gumroad API)
        async function verifyPayment() {
            try {
                // Get URL parameters
                const urlParams = new URLSearchParams(window.location.search);
                const transactionId = urlParams.get('transaction') || generateTransactionId();
                const email = urlParams.get('email') || sessionStorage.getItem('userEmail');
                
                // Show status
                updateStatus('Connecting to payment gateway...', '🔄');
                
                // Simulate API call delay
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // In production, make actual API call:
                // const response = await fetch('/api/verify-gumroad', {
                //     method: 'POST',
                //     headers: { 'Content-Type': 'application/json' },
                //     body: JSON.stringify({ transactionId, email })
                // });
                
                // For demo, we'll simulate verification
                const verified = Math.random() > 0.1; // 90% success rate for demo
                
                if (verified) {
                    showSuccess(transactionId, email);
                } else {
                    showError('Payment verification failed. Please try again or contact support.');
                }
            } catch (error) {
                console.error('Verification error:', error);
                showError('An error occurred during verification. Please refresh the page.');
            }
        }
        
        function updateStatus(text, icon) {
            document.getElementById('statusText').textContent = text;
            document.getElementById('statusIcon').textContent = icon;
        }
        
        function showSuccess(transactionId, email) {
            // Update UI
            document.getElementById('statusIcon').textContent = '✅';
            document.getElementById('statusIcon').classList.remove('checking');
            document.getElementById('statusTitle').textContent = 'Payment Verified!';
            document.getElementById('statusText').textContent = 
                `Welcome to AXIOM! Your account has been activated. Redirecting to your dashboard...`;
            
            // Show info box and buttons
            document.getElementById('infoBox').style.display = 'block';
            document.getElementById('buttonGroup').style.display = 'flex';
            
            // Show verification code
            const verCode = `${transactionId}-${Date.now()}`;
            document.getElementById('verificationCode').textContent = `License Key: ${verCode}`;
            document.getElementById('verificationCode').style.display = 'block';
            
            // Store in session/localStorage
            sessionStorage.setItem('axiomVerified', 'true');
            sessionStorage.setItem('axiomLicense', verCode);
            sessionStorage.setItem('axiomEmail', email || 'user@axiom.com');
            
            // Auto-redirect after 3 seconds
            setTimeout(() => {
                window.location.href = 'services-dashboard.html';
            }, 3000);
        }
        
        function showError(message) {
            document.getElementById('statusIcon').textContent = '❌';
            document.getElementById('statusIcon').classList.remove('checking');
            document.getElementById('statusTitle').textContent = 'Verification Failed';
            document.getElementById('statusText').textContent = message;
            
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('buttonGroup').style.display = 'flex';
        }
        
        function generateTransactionId() {
            return 'TXN-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }
        
        // Start verification when page loads
        window.addEventListener('load', () => {
            setTimeout(verifyPayment, 500);
        });
    </script>
</body>
</html>
